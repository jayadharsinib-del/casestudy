<!DOCTYPE html>
<html>
<head>
    <title>Register - Coffee Campus</title>
    <link rel="stylesheet" href="style.css">
    <script src="bootstrap.min.js" rel="stylesheet"></script>
</head>
<body>
    <header class="hero">
        <h1>Register for Coffee Campus</h1>
    </header>

    <nav class="nav-bar">
        <a href="index.html">Home</a>
        <a href="content.html">Gallery</a>
        <a href="form.html">Register</a>
    </nav>

    <section class="intro">
        <h2>Registration Form</h2>
        <form class="form-box">
            <label>Full Name:</label>
            <input type="text" class="form-control" required><br>

            <label>Phone Number:</label>
            <input type="number" class="form-control" required><br>

            <label>Email:</label>
            <input type="email" class="form-control" required><br>

            <label>Choose Event:</label>
            <select class="form-select">
                <option>Workshop</option>
                <option>Competition</option>
                <option>Exhibition</option>
            </select>

            <button type="submit" class="btn btn-coffee mt-3">Submit</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 PTSS Coffee Campus</p>
    </footer>
</body>
</html>
